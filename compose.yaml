services:
###> doctrine/doctrine-bundle ###
  database:
    container_name: streamvibe_psql_database
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      # You should definitely change the password in production
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Gk7xRz92wM}
      POSTGRES_USER: ${POSTGRES_USER:-app}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-app}", "-U", "${POSTGRES_USER:-app}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_volume:/var/lib/postgresql/data:rw
      # You may use a bind-mounted host directory instead, so that it is harder to accidentally remove the volume and lose all your data!
      # - ./docker/db/data:/var/lib/postgresql/data:rw
    expose:
      - 5432
    networks:
      - streamvibe
  ###< doctrine/doctrine-bundle ###
  app:
    container_name: streamvibe_app
    environment:
      APP_ENV: prod
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    networks:
      - streamvibe
    depends_on:
      database:
        condition: service_healthy

volumes:
###> doctrine/doctrine-bundle ###
  database_volume:
    name: streamvibe_database_volume

###< doctrine/doctrine-bundle ###

networks:
  streamvibe:
    name: streamvibe_network
